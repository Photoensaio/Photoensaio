<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Seleção Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --accent-blue: #00D1FF; --accent-purple: #9D50BB;
  --bg:#050505; --bg2:#0F0F12; --bg3:#1A1A20; --text:#F0EDE8; --text3:#6A6460;
  --green:#7EC832; --red:#E24B4A; --fb:'DM Sans',sans-serif;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);margin:0; overflow-x:hidden; -webkit-user-select:none; user-select:none;}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid rgba(255,255,255,0.1);padding:28px 0;position:sticky;top:0;height:100vh;z-index:10}
.sidebar-logo{font-family:'Playfair Display',serif;font-size:22px;padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,0.1);color:#fff}
.sidebar-logo b{color:var(--accent-blue)}
.nav-item{display:block;padding:12px 24px;color:var(--text2);text-decoration:none;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:14px;transition:0.2s}
.nav-item:hover, .nav-item.active{background:rgba(0,209,255,0.1);color:var(--accent-blue)}
.main{flex:1;padding:40px;}
.page{display:none} .page.active{display:block}
.card{background:var(--bg2);padding:25px;border-radius:15px;border:1px solid rgba(255,255,255,0.1);margin-bottom:20px}
.btn{background:linear-gradient(90deg, var(--accent-purple), var(--accent-blue));color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:600;transition:0.3s}
.btn-sm{padding:6px 12px; font-size:12px; background:#333; color:#fff; border:none; border-radius:5px; cursor:pointer; margin-top:10px}

/* Estilo da Galeria */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:20px;margin-top:20px;padding-bottom:150px}
.photo-item{aspect-ratio:3/4;background:#1A1A20;border-radius:12px;position:relative;overflow:hidden;border:4px solid transparent;cursor:pointer}
.photo-item img{width:100%;height:100%;object-fit:cover;pointer-events:none;filter: brightness(0.6);}
.photo-item.selected{border-color:var(--accent-blue);transform:scale(0.96)}
.photo-item.selected img{filter: brightness(1);}
.watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;opacity:0.3}
.watermark span{font-size:12px;transform:rotate(-30deg);white-space:nowrap;color:#fff;font-weight:bold;letter-spacing:2px;text-shadow:1px 1px 2px #000}

.selection-bar{position:fixed;bottom:20px;left:260px;right:20px;background:rgba(15,15,18,0.95);backdrop-filter:blur(10px);padding:20px 30px;border-radius:15px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--accent-blue);z-index:100;box-shadow:0 10px 30px rgba(0,0,0,0.8)}
.info-txt{font-size:13px; line-height:1.4}
.info-txt b{color:var(--accent-blue)}
.extra-alert{font-size:11px; color:var(--text3); margin-top:4px}
</style>
</head>
<body oncontextmenu="return false">

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b></div>
    <button class="nav-item active" id="nav-dash" onclick="showPage('dash', this)">Dashboard</button>
    <button class="nav-item" onclick="showPage('novo', this)">+ Novo Ensaio</button>
  </div>

  <div class="main">
    <div id="page-dash" class="page active">
      <h2 style="font-family:'Playfair Display'">Seus Ensaios</h2>
      <div class="card" id="lista-ensaios"></div>
    </div>

    <div id="page-novo" class="page">
      <h2 style="font-family:'Playfair Display'">Configurar Galeria</h2>
      <div class="card">
        <input id="c-name" type="text" placeholder="Nome do Cliente" style="width:95%; padding:12px; margin-bottom:10px; background:#1A1A20; color:#fff; border:1px solid #333; border-radius:8px">
        <input id="c-pass" type="text" placeholder="Senha de Acesso" style="width:95%; padding:12px; margin-bottom:10px; background:#1A1A20; color:#fff; border:1px solid #333; border-radius:8px">
        <textarea id="c-links" rows="5" placeholder="Cole aqui os links das fotos do Drive" style="width:95%; padding:12px; margin-bottom:10px; background:#1A1A20; color:#fff; border:1px solid #333; border-radius:8px"></textarea>
        <div class="form-group">
            <label style="font-size:12px; color:var(--text3)">FOTOS INCLUSAS NO PACOTE:</label><br>
            <input id="c-pacote" type="number" value="10" style="width:100px; padding:12px; margin-top:5px; background:#1A1A20; color:#fff; border:1px solid #333; border-radius:8px">
        </div>
        <button class="btn" onclick="salvarEnsaio()" style="width:100%; margin-top:20px">Gerar Galeria e Link</button>
      </div>
    </div>

    <div id="page-galeria" class="page">
      <div id="login-area" style="text-align:center; padding-top:50px">
        <h2 id="cliente-tit">Olá!</h2>
        <p>Acesse suas fotos exclusivas com a senha fornecida.</p>
        <input id="pass-input" type="password" placeholder="Sua senha" style="padding:15px; border-radius:8px; border:1px solid #333; background:#1A1A20; color:#fff; width:200px">
        <button class="btn" onclick="abrirGaleria()">Ver Fotos</button>
      </div>
      <div id="galeria-area" style="display:none">
        <h2 id="boas-vindas">Suas Fotos</h2>
        <div class="photo-grid" id="grid"></div>
      </div>
    </div>
  </div>
</div>

<div class="selection-bar" id="bar" style="display:none">
  <div class="info-txt">
    <div>Fotos selecionadas: <b id="sel-count">0</b> de <span id="p-total">10</span></div>
    <div class="extra-alert">Deseja mais fotos? Cada imagem extra custa apenas <b>R$ 19,90</b>.</div>
  </div>
  <button class="btn" onclick="enviarWhats()" style="padding:15px 30px">Finalizar Seleção</button>
</div>

<script>
let database = JSON.parse(localStorage.getItem('pe_db')) || [];
let selecionadas = [];
let atual = null;

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const idEnsaio = urlParams.get('id');
    if(idEnsaio) {
        atual = database.find(e => e.id == idEnsaio);
        if(atual) {
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('cliente-tit').innerText = `Olá, ${atual.nome}!`;
            showPage('galeria');
        }
    } else { renderDash(); }
};

function formatDriveLink(link){
    if(link.includes('drive.google.com')){
        let id = '';
        if(link.includes('/d/')) id = link.split('/d/')[1].split('/')[0];
        else if(link.includes('id=')) id = link.split('id=')[1].split('&')[0];
        return `https://lh3.googleusercontent.com/u/0/d/${id}=w1000-h1000`;
    }
    return link;
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function salvarEnsaio(){
  const nome = document.getElementById('c-name').value;
  const pass = document.getElementById('c-pass').value;
  const rawLinks = document.getElementById('c-links').value.split(/[\s,]+/);
  const links = rawLinks.filter(l => l.startsWith('http')).map(formatDriveLink);
  
  if(!nome || !pass || links.length === 0) return alert("Preencha todos os campos!");

  const id = Date.now();
  const novo = { id, nome, pass, links, pacote: document.getElementById('c-pacote').value, status: 'new' };
  database.unshift(novo);
  localStorage.setItem('pe_db', JSON.stringify(database));
  renderDash();
  showPage('dash', document.getElementById('nav-dash'));
  alert("Galeria criada!");
}

function renderDash(){
  const lista = document.getElementById('lista-ensaios');
  const baseUrl = window.location.href.split('?')[0];
  lista.innerHTML = database.length ? database.map(e => `
    <div class="ensaio-item">
      <b>${e.nome} (Pacote: ${e.pacote} fotos) - Senha: ${e.pass}</b>
      <div class="link-box">${baseUrl}?id=${e.id}</div>
      <div style="display:flex; gap:10px">
        <button class="btn-sm" onclick="copyLink('${baseUrl}?id=${e.id}')">Copiar Link</button>
        <button class="btn-sm" style="background:var(--red)" onclick="excluir(${e.id})">Excluir</button>
      </div>
    </div>
  `).join('') : "Nenhum ensaio criado.";
}

function copyLink(link) { navigator.clipboard.writeText(link); alert("Link copiado!"); }

function excluir(id){
  if(confirm("Apagar ensaio?")){
    database = database.filter(e => e.id !== id);
    localStorage.setItem('pe_db', JSON.stringify(database));
    renderDash();
  }
}

function abrirGaleria(){
  const passInput = document.getElementById('pass-input').value;
  if(atual && atual.pass === passInput){
    document.getElementById('login-area').style.display='none';
    document.getElementById('galeria-area').style.display='block';
    document.getElementById('bar').style.display='flex';
    document.getElementById('p-total').innerText = atual.pacote;
    document.getElementById('grid').innerHTML = atual.links.map((l, i) => `
      <div class="photo-item" id="p-${i}" onclick="toggle(${i})">
        <div class="watermark"><span>PHOTO ENSAIO</span></div>
        <img src="${l}" onerror="this.src='https://via.placeholder.com/400x600?text=Acesso+Restrito+Drive'">
      </div>
    `).join('');
  } else { alert("Senha incorreta!"); }
}

function toggle(i){
  const el = document.getElementById('p-'+i);
  if(selecionadas.includes(i)){
    selecionadas = selecionadas.filter(x => x !== i);
    el.classList.remove('selected');
  } else {
    selecionadas.push(i);
    el.classList.add('selected');
  }
  document.getElementById('sel-count').innerText = selecionadas.length;
}

function enviarWhats(){
  const pacote = parseInt(atual.pacote);
  const total = selecionadas.length;
  const extras = Math.max(0, total - pacote);
  const resumo = selecionadas.map(x => x + 1).sort((a,b)=>a-b).join(', ');
  const msg = encodeURIComponent(`Olá, Photo EnsAIo! Finalizei minha seleção:\n👤 Cliente: ${atual.nome}\n📸 Fotos: ${resumo}\n✅ Total: ${total} fotos\n💰 Extras: ${extras}`);
  window.open(`https://wa.me/5548996665391?text=${msg}`);
}
</script>
</body>
</html>
