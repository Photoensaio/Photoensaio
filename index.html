<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent-blue: #00D1FF;
  --accent-purple: #9D50BB;
  --bg:#050505; --bg2:#0F0F12; --bg3:#1A1A20;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#F0EDE8; --text2:#A09890; --text3:#6A6460;
  --green:#7EC832; --red:#E24B4A;
  --fd:'Playfair Display',serif; --fb:'DM Sans',sans-serif;
  --r:10px; --rl:16px;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 0;position:sticky;top:0;height:100vh}
.sidebar-logo{font-family:var(--fd);font-size:22px;color:#FFF;padding:0 24px 28px;border-bottom:1px solid var(--border); letter-spacing: 1px;}
.sidebar-logo b {color: var(--accent-blue);}
.sidebar-logo span{display:block;font-family:var(--fb);font-size:10px;color:var(--accent-purple);letter-spacing:.12em;text-transform:uppercase;margin-top:2px; font-weight: 600;}

.nav{padding:20px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;font-family:var(--fb)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(0, 209, 255, 0.1);color:var(--accent-blue)}

.main{flex:1;overflow-y:auto}
.page{display:none;padding:40px 44px}
.page.active{display:block}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.page-title{font-family:var(--fd);font-size:28px;font-weight:400}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-val{font-size:28px;font-family:var(--fd);font-weight:400}
.stat-val.blue{color:var(--accent-blue)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:24px 28px;margin-bottom:24px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px}

.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.form-group input, .form-group select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-family:var(--fb);font-size:14px;color:var(--text);outline:none;}

.btn-blue{background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); color:#FFF;border:none;padding:14px 28px;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;width:100%; transition: opacity 0.2s;}

.ensaio-row{display:flex;align-items:center;padding:16px 20px;border-radius:var(--rl);border:1px solid var(--border);background:var(--bg2);margin-bottom:10px;gap:16px;}
.ensaio-avatar{width:40px;height:40px;border-radius:50%;background: linear-gradient(45deg, var(--accent-purple), var(--accent-blue)); color:#FFF;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ensaio-info{flex:1;min-width:0}
.ensaio-name{font-size:15px;font-weight:500;margin-bottom:2px}

.row-actions{display:flex;gap:12px;align-items:center;}
.btn-del{background: none; border: none; color: var(--red); cursor: pointer; padding: 5px; opacity: 0.6;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--accent-blue);padding:12px 24px;border-radius:30px;font-size:14px;opacity:0;transition:0.3s;z-index:9999;}
.toast.show{opacity:1; bottom:50px;}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b><span>Estúdio de Fotos IA</span></div>
    <nav class="nav">
      <button class="nav-item active" onclick="goPage('admin',this)">◈ Dashboard</button>
      <button class="nav-item" onclick="goPage('novo',this)">+ Novo ensaio</button>
      <button class="nav-item" onclick="goPage('ensaios',this)">▦ Lista de Ensaios</button>
    </nav>
  </div>

  <div class="main">
    <div id="page-admin" class="page active">
      <div class="topbar"><h1 class="page-title">Dashboard</h1></div>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">Total de ensaios</div><div class="stat-val blue" id="s-total">0</div></div>
        <div class="stat"><div class="stat-label">Novos</div><div class="stat-val" id="s-new">0</div></div>
        <div class="stat"><div class="stat-label">Pendentes</div><div class="stat-val" id="s-pend">0</div></div>
        <div class="stat"><div class="stat-label">Finalizados</div><div class="stat-val" id="s-done">0</div></div>
      </div>
      <div class="card">
        <div class="card-title">Atividade Recente</div>
        <div id="dash-list"></div>
      </div>
    </div>

    <div id="page-novo" class="page">
      <div class="topbar"><h1 class="page-title">Novo ensaio</h1></div>
      <div class="card">
        <div class="form-grid">
          <div class="form-group"><label>Nome do cliente</label><input id="f-name" type="text" placeholder="Ex: Ana Lima" /></div>
          <div class="form-group"><label>WhatsApp</label><input id="f-wa" type="text" placeholder="71999990000" /></div>
          <div class="form-group"><label>Senha do álbum</label><input id="f-pass" type="text" placeholder="Ex: AnaPhoto" /></div>
          <div class="form-group"><label>Fotos no pacote</label><input id="f-pacote" type="number" value="5" /></div>
          <div class="form-group"><label>Preço foto extra (R$)</label><input id="f-extra" type="number" value="19.90" step="0.01" /></div>
          <div class="form-group"><label>Total de fotos</label><input id="f-total" type="number" value="20" /></div>
        </div>
        <button class="btn-blue" style="margin-top:20px" onclick="criarEnsaio()">Criar Álbum do Cliente</button>
      </div>
    </div>

    <div id="page-ensaios" class="page">
      <div class="topbar"><h1 class="page-title">Gerenciar Ensaios</h1></div>
      <div id="ensaios-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ensaios = JSON.parse(localStorage.getItem('photoensaio_db')) || [];

function save() {
  localStorage.setItem('photoensaio_db', JSON.stringify(ensaios));
}

function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id === 'admin') renderDash();
  if(id === 'ensaios') renderEnsaios();
}

function renderDash() {
  document.getElementById('s-total').textContent = ensaios.length;
  document.getElementById('s-new').textContent = ensaios.filter(e => e.status === 'new').length;
  document.getElementById('s-pend').textContent = ensaios.filter(e => e.status === 'pending').length;
  document.getElementById('s-done').textContent = ensaios.filter(e => e.status === 'done').length;
  document.getElementById('dash-list').innerHTML = ensaios.slice(0, 5).map(rowHtml).join('');
}

function renderEnsaios() {
  document.getElementById('ensaios-list').innerHTML = ensaios.length ? ensaios.map(rowHtml).join('') : '<div style="color:var(--text3)">Nenhum ensaio criado.</div>';
}

function rowHtml(e) {
  const ini = e.name.charAt(0).toUpperCase();
  return `
    <div class="ensaio-row">
      <div class="ensaio-avatar">${ini}</div>
      <div class="ensaio-info">
        <div class="ensaio-name">${e.name}</div>
        <div class="ensaio-meta">${e.totalFotos} fotos • Senha: <b>${e.pass}</b></div>
      </div>
      <div class="row-actions">
        <button class="btn-del" onclick="excluirEnsaio(${e.id})" title="Excluir Ensaio">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>
    </div>`;
}

function criarEnsaio() {
  const name = document.getElementById('f-name').value;
  const pass = document.getElementById('f-pass').value;
  if(!name || !pass) { showToast("Preencha o nome e a senha!"); return; }

  const novo = {
    id: Date.now(),
    name,
    wa: document.getElementById('f-wa').value,
    pass,
    pacote: parseInt(document.getElementById('f-pacote').value),
    extraPrice: parseFloat(document.getElementById('f-extra').value),
    totalFotos: parseInt(document.getElementById('f-total').value),
    status: 'new'
  };

  ensaios.unshift(novo);
  save();
  showToast("Ensaio criado com sucesso!");
  goPage('admin', document.querySelector('.nav-item'));
}

function excluirEnsaio(id) {
  if(confirm("Deseja apagar este ensaio?")) {
    ensaios = ensaios.filter(e => e.id !== id);
    save();
    renderDash();
    renderEnsaios();
    showToast("Ensaio removido.");
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderDash();
</script>
</body>
</html>
