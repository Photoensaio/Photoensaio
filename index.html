<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Seleção Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  /* SUAS CORES DA LOGOMARCA */
  --accent-blue: #00D1FF; /* Azul Neon */
  --accent-purple: #9D50BB; /* Roxo Neon */
  --bg: #050505; --bg2: #0F0F12; --bg3: #1A1A20; 
  --text: #F0EDE8; --text-muted: #8A847E;
  --fb: 'DM Sans', sans-serif; --fs: 'Playfair Display', serif;
}
body{font-family:var(--fb); background:var(--bg); color:var(--text); margin:0; overflow-x:hidden; -webkit-user-select:none; user-select:none;}
.app{display:flex; min-height:100vh}

/* Sidebar Refinada - Mantendo a estrutura */
.sidebar{width:260px; background:var(--bg2); border-right:1px solid rgba(0, 209, 255, 0.1); padding:40px 0; position:sticky; top:0; height:100vh; z-index:10}
.sidebar-logo{font-family:var(--fs); font-size:24px; padding:0 30px 40px; color:#fff; letter-spacing:1px}
.sidebar-logo b{color:var(--accent-blue)} /* Usando Azul Neon no Logo */
.nav-item{display:block; padding:15px 30px; color:var(--text-muted); text-decoration:none; cursor:pointer; border:none; background:none; width:100%; text-align:left; font-size:14px; transition:0.3s; letter-spacing:0.5px}
.nav-item:hover, .nav-item.active{background:rgba(0, 209, 255, 0.05); color:var(--accent-blue)} /* Usando Azul Neon no Hover */

.main{flex:1; padding:60px;}
.page{display:none} .page.active{display:block}
.card{background:var(--bg2); padding:35px; border-radius:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:30px}

/* Inputs Premium */
input, textarea{width:100%; background:var(--bg3); border:1px solid rgba(255,255,255,0.1); padding:15px; color:#fff; border-radius:12px; margin-bottom:15px; font-family:var(--fb); outline:none; transition:0.3s}
input:focus{border-color:var(--accent-blue)} /* Azul Neon no Foco */

/* Botão Gradiente com Suas Cores */
.btn{background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); color:#fff; border:none; padding:18px; border-radius:12px; cursor:pointer; font-weight:600; font-size:15px; transition:0.4s; letter-spacing:0.5px}
.btn:hover{opacity: 0.9; transform:translateY(-2px)}

/* Galeria de Fotos */
.photo-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:25px; margin-top:30px; padding-bottom:180px}
.photo-item{aspect-ratio:3/4; background:var(--bg3); border-radius:15px; position:relative; overflow:hidden; border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:0.4s}
.photo-item img{width:100%; height:100%; object-fit:cover; pointer-events:none; filter: grayscale(30%) brightness(0.7); transition:0.5s}
.photo-item.selected{border: 2px solid var(--accent-blue); transform: scale(0.97); box-shadow: 0 0 20px rgba(0, 209, 255, 0.2)} /* Azul Neon na Seleção */
.photo-item.selected img{filter: grayscale(0%) brightness(1.1)}

.watermark{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none; opacity:0.15}
.watermark span{font-size:14px; transform:rotate(-35deg); color:#fff; font-weight:bold; letter-spacing:4px}

/* Barra de Seleção PREMIUM flutuante */
.selection-bar{position:fixed; bottom:30px; left:290px; right:30px; background:rgba(15,15,18,0.9); backdrop-filter:blur(20px); padding:25px 40px; border-radius:25px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(0, 209, 255, 0.3); z-index:100; box-shadow:0 20px 50px rgba(0,0,0,0.9)} /* Borda Azul Neon */
.info-txt{display:flex; flex-direction:column; gap:5px}
.info-txt .status{font-family:var(--fs); font-size:20px; color:var(--text)}
.info-txt .status b{color:var(--accent-blue)} /* Azul Neon no Contador */
.info-txt .hint{font-size:12px; color:var(--text-muted); letter-spacing:0.5px}

/* Dashboard */
.ensaio-item{padding:25px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center}
.link-box{background:#000; padding:12px; border-radius:10px; font-family:monospace; font-size:11px; color:var(--accent-blue); margin:10px 0; border:1px solid rgba(0, 209, 255, 0.1)} /* Links em Azul Neon */
</style>
</head>
<body oncontextmenu="return false">

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b></div>
    <button class="nav-item active" id="nav-dash" onclick="showPage('dash', this)">Estúdio</button>
    <button class="nav-item" onclick="showPage('novo', this)">Novo Álbum</button>
  </div>

  <div class="main">
    <div id="page-dash" class="page active">
      <h2 style="font-family:var(--fs); font-size:32px; margin-bottom:30px">Seus Ensaios</h2>
      <div class="card" id="lista-ensaios"></div>
    </div>

    <div id="page-novo" class="page">
      <h2 style="font-family:var(--fs); font-size:32px; margin-bottom:30px">Configurar Galeria</h2>
      <div class="card">
        <input id="c-name" type="text" placeholder="Nome do Cliente">
        <input id="c-pass" type="text" placeholder="Senha de Acesso">
        <textarea id="c-links" rows="5" placeholder="Links do Drive (Um por linha)"></textarea>
        <div style="margin-top:10px">
            <label style="font-size:11px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase">Fotos Inclusas no Pacote:</label>
            <input id="c-pacote" type="number" value="10" style="width:120px; margin-top:8px">
        </div>
        <button class="btn" onclick="salvarEnsaio()" style="width:100%; margin-top:20px">Gerar Link do Álbum</button>
      </div>
    </div>

    <div id="page-galeria" class="page">
      <div id="login-area" style="text-align:center; padding-top:100px; max-width:400px; margin:0 auto">
        <h2 id="cliente-tit" style="font-family:var(--fs); font-size:36px">Olá!</h2>
        <p style="color:var(--text-muted); margin-bottom:40px">Para sua privacidade, insira sua senha de acesso.</p>
        <input id="pass-input" type="password" placeholder="Digite sua senha" style="text-align:center; font-size:18px">
        <button class="btn" onclick="abrirGaleria()" style="width:100%">Entrar na Galeria</button>
      </div>
      <div id="galeria-area" style="display:none">
        <h2 id="boas-vindas" style="font-family:var(--fs); font-size:32px">Sua Seleção</h2>
        <div class="photo-grid" id="grid"></div>
      </div>
    </div>
  </div>
</div>

<div class="selection-bar" id="bar" style="display:none">
  <div class="info-txt">
    <div class="status"><b id="sel-count">0</b> <span style="font-size:15px; opacity:0.6">de</span> <span id="p-total">10</span> fotos</div>
    <div class="hint">Inclusas no seu pacote. Extras: <b>R$ 19,90/cada</b></div>
  </div>
  <button class="btn" onclick="enviarWhats()" style="padding:15px 40px; border-radius:50px">Finalizar e Enviar</button>
</div>

<script>
let database = JSON.parse(localStorage.getItem('pe_db')) || [];
let selecionadas = [];
let atual = null;

// Mantendo a configuração de correção de links do Drive
function formatDriveLink(link){
    if(link.includes('drive.google.com')){
        let id = '';
        if(link.includes('/d/')) id = link.split('/d/')[1].split('/')[0];
        else if(link.includes('id=')) id = link.split('id=')[1].split('&')[0];
        return `https://lh3.googleusercontent.com/u/0/d/${id}=w1000`;
    }
    return link;
}

// Mantendo a configuração de ID na URL ao carregar
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const idEnsaio = urlParams.get('id');
    if(idEnsaio) {
        atual = database.find(e => e.id == idEnsaio);
        if(atual) {
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('cliente-tit').innerText = `Olá, ${atual.nome}!`;
            showPage('galeria');
        }
    } else { renderDash(); }
};

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function salvarEnsaio(){
  const nome = document.getElementById('c-name').value;
  const pass = document.getElementById('c-pass').value;
  const rawLinks = document.getElementById('c-links').value.split(/\n/);
  const links = rawLinks.filter(l => l.trim() !== '').map(l => formatDriveLink(l.trim()));
  
  if(!nome || !pass || links.length === 0) return alert("Preencha todos os campos!");

  const novo = { id: Date.now(), nome, pass, links, pacote: document.getElementById('c-pacote').value };
  database.unshift(novo);
  localStorage.setItem('pe_db', JSON.stringify(database));
  renderDash();
  showPage('dash', document.getElementById('nav-dash'));
  alert("Álbum criado com sucesso!");
}

function renderDash(){
  const lista = document.getElementById('lista-ensaios');
  const baseUrl = window.location.href.split('?')[0];
  lista.innerHTML = database.length ? database.map(e => `
    <div class="ensaio-item">
      <div>
        <b style="font-family:var(--fs); font-size:18px">${e.nome}</b><br>
        <small style="color:var(--text-muted)">Senha: ${e.pass} | Pacote: ${e.pacote} fotos</small>
        <div class="link-box">${baseUrl}?id=${e.id}</div>
      </div>
      <div style="display:flex; gap:10px">
        <button class="btn" style="padding:10px 20px; font-size:12px" onclick="copyLink('${baseUrl}?id=${e.id}')">Copiar Link</button>
        <button class="btn" style="background:#441111; color:#ff5555; padding:10px 20px; font-size:12px; background-image:none" onclick="excluir(${e.id})">Excluir</button>
      </div>
    </div>
  `).join('') : "<p style='color:var(--text-muted)'>Nenhum álbum criado ainda.</p>";
}

function copyLink(link) { navigator.clipboard.writeText(link); alert("Link copiado para o WhatsApp!"); }

function excluir(id){
  if(confirm("Deseja apagar este ensaio permanentemente?")){
    database = database.filter(e => e.id !== id);
    localStorage.setItem('pe_db', JSON.stringify(database));
    renderDash();
  }
}

function abrirGaleria(){
  if(atual && atual.pass === document.getElementById('pass-input').value){
    document.getElementById('login-area').style.display='none';
    document.getElementById('galeria-area').style.display='block';
    document.getElementById('bar').style.display='flex';
    document.getElementById('p-total').innerText = atual.pacote;
    
    document.getElementById('grid').innerHTML = atual.links.map((l, i) => `
      <div class="photo-item" id="p-${i}" onclick="toggle(${i})">
        <div class="watermark"><span>PHOTO ENSAIO</span></div>
        <img src="${l}" onerror="this.src='https://via.placeholder.com/600x800/111/fff?text=Erro+no+Drive'">
      </div>
    `).join('');
  } else { alert("Senha de acesso incorreta."); }
}

function toggle(i){
  const el = document.getElementById('p-'+i);
  if(selecionadas.includes(i)){
    selecionadas = selecionadas.filter(x => x !== i);
    el.classList.remove('selected');
  } else {
    selecionadas.push(i);
    el.classList.add('selected');
  }
  document.getElementById('sel-count').innerText = selecionadas.length;
}

// Mantendo o número correto: 5548996665391
function enviarWhats(){
  const pacote = parseInt(atual.pacote);
  const total = selecionadas.length;
  const extras = Math.max(0, total - pacote);
  const resumo = selecionadas.map(x => x + 1).sort((a,b)=>a-b).join(', ');
  const msg = encodeURIComponent(`Olá, Photo EnsAIo!\nFinalizei minha seleção:\n\n👤 Cliente: ${atual.nome}\n📸 Fotos: ${resumo}\n✅ Total: ${total} fotos\n💰 Fotos Extras: ${extras}`);
  window.open(`https://wa.me/5548996665391?text=${msg}`);
}
</script>
</body>
</html>
