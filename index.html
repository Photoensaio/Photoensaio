<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Seleção de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --accent-blue: #00D1FF; --accent-purple: #9D50BB;
  --bg:#050505; --bg2:#0F0F12; --text:#F0EDE8; --text3:#6A6460;
  --green:#7EC832; --red:#E24B4A; --fb:'DM Sans',sans-serif;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);margin:0; -webkit-user-select:none; user-select:none;}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid rgba(255,255,255,0.1);padding:28px 0;position:sticky;top:0;height:100vh}
.sidebar-logo{font-family:'Playfair Display',serif;font-size:22px;padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,0.1);}
.sidebar-logo b{color:var(--accent-blue)}
.nav-item{display:block;padding:12px 24px;color:var(--text);text-decoration:none;cursor:pointer;}
.nav-item:hover, .nav-item.active{background:rgba(0,209,255,0.1);color:var(--accent-blue)}
.main{flex:1;padding:40px;}
.page{display:none} .page.active{display:block}
.card{background:var(--bg2);padding:25px;border-radius:15px;border:1px solid rgba(255,255,255,0.1);margin-bottom:20px}
.form-group{margin-bottom:15px;display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:var(--text3);text-transform:uppercase}
.form-group input{background:#1A1A20;border:1px solid rgba(255,255,255,0.2);padding:12px;color:#fff;border-radius:8px}
.btn{background:linear-gradient(90deg, var(--accent-purple), var(--accent-blue));color:#fff;border:none;padding:15px;border-radius:8px;cursor:pointer;font-weight:600;width:100%}

/* Estilo da Galeria Cliente */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:15px;margin-top:20px}
.photo-item{aspect-ratio:3/4;background:#1A1A20;border-radius:10px;position:relative;overflow:hidden;border:3px solid transparent;cursor:pointer;transition:0.2s}
.photo-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.photo-item.selected{border-color:var(--accent-blue);transform:scale(0.95)}
.watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;opacity:0.3}
.watermark span{font-size:12px;transform:rotate(-30deg);white-space:nowrap;color:#fff;font-weight:bold;letter-spacing:2px}
.selection-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,18,0.95);padding:20px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--accent-blue);z-index:100}
</style>
</head>
<body oncontextmenu="return false" onkeydown="return checkKey(event)">

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b></div>
    <div class="nav-item active" onclick="showPage('admin')">Painel ADM</div>
    <div class="nav-item" onclick="showPage('galeria')">Ver Galeria (Cliente)</div>
  </div>

  <div class="main">
    <div id="page-admin" class="page active">
      <h2>Criar Novo Álbum</h2>
      <div class="card">
        <div class="form-group"><label>Nome do Cliente</label><input id="c-name" type="text" placeholder="Ex: Ana Souza"></div>
        <div class="form-group"><label>Senha do Álbum</label><input id="c-pass" type="text" placeholder="Ex: ana123"></div>
        <div class="form-group"><label>Link das Fotos (Imgur ou similar)</label><input id="c-links" type="text" placeholder="Cole os links das fotos separados por vírgula"></div>
        <div class="form-group"><label>Qtd Fotos no Pacote</label><input id="c-pacote" type="number" value="5"></div>
        <button class="btn" onclick="gerarAlbum()">Gerar Álbum e Copiar Link</button>
      </div>
      <div id="lista-albuns"></div>
    </div>

    <div id="page-galeria" class="page">
      <div id="login-area">
        <h2>Acesse seu Álbum</h2>
        <input id="pass-input" type="password" placeholder="Digite sua senha" style="padding:15px; border-radius:8px; border:none; width:200px">
        <button class="btn" style="width:auto" onclick="acessarGaleria()">Entrar</button>
      </div>
      
      <div id="galeria-area" style="display:none">
        <h2 id="cliente-boasvindas">Olá! Selecione suas fotos:</h2>
        <div class="photo-grid" id="grid"></div>
      </div>
    </div>
  </div>
</div>

<div class="selection-bar" id="bar" style="display:none">
  <div>Selecionadas: <b id="sel-count">0</b> / <span id="pacote-total">0</span></div>
  <button class="btn" style="width:auto; padding:10px 30px" onclick="finalizarSelecao()">Enviar Seleção p/ WhatsApp</button>
</div>

<script>
let database = JSON.parse(localStorage.getItem('pe_db')) || [];
let selecionadas = [];
let albumAtual = null;

function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function gerarAlbum(){
  const nome = document.getElementById('c-name').value;
  const pass = document.getElementById('c-pass').value;
  const links = document.getElementById('c-links').value.split(',');
  const pacote = document.getElementById('c-pacote').value;
  
  if(!nome || !pass) return alert("Preencha os dados!");
  
  const album = { id: Date.now(), nome, pass, links, pacote };
  database.push(album);
  localStorage.setItem('pe_db', JSON.stringify(database));
  alert("Álbum criado! Cliente já pode acessar com a senha.");
  location.reload();
}

function acessarGaleria(){
  const pass = document.getElementById('pass-input').value;
  albumAtual = database.find(a => a.pass === pass);
  
  if(albumAtual){
    document.getElementById('login-area').style.display = 'none';
    document.getElementById('galeria-area').style.display = 'block';
    document.getElementById('bar').style.display = 'flex';
    document.getElementById('pacote-total').innerText = albumAtual.pacote;
    renderFotos();
  } else {
    alert("Senha incorreta!");
  }
}

function renderFotos(){
  const grid = document.getElementById('grid');
  grid.innerHTML = albumAtual.links.map((link, i) => `
    <div class="photo-item" onclick="toggleFoto(${i}, this)">
      <div class="watermark"><span>PHOTO ENSAIO</span></div>
      <img src="${link.trim()}">
    </div>
  `).join('');
}

function toggleFoto(idx, el){
  if(selecionadas.includes(idx)){
    selecionadas = selecionadas.filter(i => i !== idx);
    el.classList.remove('selected');
  } else {
    selecionadas.push(idx);
    el.classList.add('selected');
  }
  document.getElementById('sel-count').innerText = selecionadas.size;
  document.getElementById('sel-count').innerText = selecionadas.length;
}

function finalizarSelecao(){
  const msg = encodeURIComponent(`Olá! Sou ${albumAtual.nome} e finalizei minha seleção:\n\nFotos escolhidas: ${selecionadas.map(i => i+1).join(', ')}\nTotal: ${selecionadas.length} fotos.`);
  window.open(`https://wa.me/5571999990000?text=${msg}`); // COLOQUE SEU WHATSAPP AQUI
}

// PROTEÇÕES GERAIS
function checkKey(e){
  if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
}
document.addEventListener('keyup', (e) => {
    if (e.key === 'PrintScreen') {
        navigator.clipboard.writeText('');
        alert('Prints são proibidos nesta galeria 🔒');
    }
});
</script>
</body>
</html>
