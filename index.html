<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Gestão Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --accent-blue: #00D1FF; --accent-purple: #9D50BB;
  --bg: #050505; --bg2: #0F0F12; --bg3: #1A1A20; 
  --text: #F0EDE8; --text-muted: #8A847E; --green: #7EC832;
  --fb: 'DM Sans', sans-serif; --fs: 'Playfair Display', serif;
}
body{font-family:var(--fb); background:var(--bg); color:var(--text); margin:0; overflow-x:hidden; -webkit-user-select:none; user-select:none;}
.app{display:flex; min-height:100vh}

.sidebar{width:260px; background:var(--bg2); border-right:1px solid rgba(0, 209, 255, 0.1); padding:40px 0; position:sticky; top:0; height:100vh; z-index:10; display:flex; flex-direction:column;}
.sidebar-logo{font-family:var(--fs); font-size:24px; padding:0 30px 40px; color:#fff; letter-spacing:1px}
.sidebar-logo b{color:var(--accent-blue)}
.nav-item{display:block; padding:15px 30px; color:var(--text-muted); text-decoration:none; cursor:pointer; border:none; background:none; width:100%; text-align:left; font-size:14px; transition:0.3s; letter-spacing:0.5px}
.nav-item:hover, .nav-item.active{background:rgba(0, 209, 255, 0.05); color:var(--accent-blue)}

.main{flex:1; padding:40px;}
.page{display:none} .page.active{display:block}
.card{background:var(--bg2); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:30px}

input, textarea{width:100%; background:var(--bg3); border:1px solid rgba(255,255,255,0.1); padding:15px; color:#fff; border-radius:12px; margin-bottom:15px; font-family:var(--fb); outline:none; transition:0.3s; box-sizing: border-box;}
input:focus{border-color:var(--accent-blue)}

.btn{background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); color:#fff; border:none; padding:15px 25px; border-radius:10px; cursor:pointer; font-weight:600; font-size:14px; transition:0.4s;}
.btn:hover{opacity: 0.9; transform:translateY(-2px)}
.btn-alt{background: var(--bg3); color: var(--text); border: 1px solid var(--accent-blue); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px;}

.ensaio-item{padding:20px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; gap:10px}
.link-box{background:#000; padding:10px; border-radius:8px; font-family:monospace; font-size:11px; color:var(--accent-blue); border:1px dashed #333; word-break: break-all;}

.photo-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; margin-top:30px; padding-bottom:180px}
.photo-item{aspect-ratio:3/4; background:var(--bg3); border-radius:15px; position:relative; overflow:hidden; border:3px solid transparent; cursor:pointer; transition:0.3s}
.photo-item img{width:100%; height:100%; object-fit:cover; pointer-events:none; filter: brightness(0.6); transition:0.5s}
.photo-item.selected{border-color: var(--accent-blue); transform: scale(0.97)}
.photo-item.selected img{filter: brightness(1.1)}

.watermark{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none; opacity:0.15}
.watermark span{font-size:12px; transform:rotate(-35deg); color:#fff; font-weight:bold; letter-spacing:3px}

.selection-bar{position:fixed; bottom:30px; left:290px; right:30px; background:rgba(15,15,18,0.92); backdrop-filter:blur(15px); padding:20px 40px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(0, 209, 255, 0.3); z-index:100; box-shadow:0 20px 40px rgba(0,0,0,0.8)}
.info-txt .status{font-family:var(--fs); font-size:22px}
.info-txt .hint{font-size:12px; color:var(--text-muted); margin-top:5px}

.success-screen{text-align:center; padding:120px 20px; display:none}
</style>
</head>
<body oncontextmenu="return false">

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b></div>
    <button class="nav-item active" id="nav-dash" onclick="showPage('dash', this)">Dashboard</button>
    <button class="nav-item" id="nav-novo" onclick="limparForm(); showPage('novo', this)">+ Novo Ensaio</button>
    <div style="margin-top:auto; padding:20px; display:flex; flex-direction:column; gap:10px">
        <button class="btn-alt" onclick="exportarBackup()">⬇ Exportar Backup</button>
        <button class="btn-alt" onclick="document.getElementById('importInput').click()">⬆ Importar Backup</button>
        <input type="file" id="importInput" style="display:none" onchange="importarBackup(event)">
    </div>
  </div>

  <div class="main">
    <div id="page-dash" class="page active">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h2 style="font-family:var(--fs); font-size:28px">Seus Ensaios</h2>
        <input type="text" id="dash-search" style="width:250px; margin-bottom:0" placeholder="🔍 Buscar cliente..." onkeyup="renderDash()">
      </div>
      <div class="card" id="lista-ensaios"></div>
    </div>

    <div id="page-novo" class="page">
      <h2 id="form-title" style="font-family:var(--fs); font-size:28px">Configurar Novo Álbum</h2>
      <div class="card">
        <input id="c-edit-id" type="hidden">
        <input id="c-name" type="text" placeholder="Nome do Cliente">
        <input id="c-pass" type="text" placeholder="Senha de Acesso">
        <textarea id="c-links" rows="8" placeholder="Cole os links das fotos aqui"></textarea>
        <div style="margin-top:10px">
            <label style="font-size:12px; color:var(--text-muted)">FOTOS NO PACOTE:</label><br>
            <input id="c-pacote" type="number" value="10" style="width:120px; margin-top:5px">
        </div>
        <button id="btn-save" class="btn" onclick="salvarEnsaio()" style="width:100%; margin-top:10px">Criar Galeria Profissional</button>
      </div>
    </div>

    <div id="page-galeria" class="page">
      <div id="login-area" style="text-align:center; padding-top:100px; max-width:400px; margin:0 auto">
        <h2 id="cliente-tit" style="font-family:var(--fs); font-size:36px">Olá!</h2>
        <p style="color:var(--text-muted); margin-bottom:40px">Acesse sua galeria privada com a senha fornecida.</p>
        <input id="pass-input" type="password" placeholder="Sua senha" style="text-align:center; font-size:18px">
        <button class="btn" onclick="abrirGaleria()" style="width:100%">Entrar</button>
      </div>
      <div id="galeria-area" style="display:none">
        <h2 id="boas-vindas" style="font-family:var(--fs); font-size:32px">Sua Seleção</h2>
        <div class="photo-grid" id="grid"></div>
      </div>
      <div id="finish-area" class="success-screen">
        <h2 style="color:var(--accent-blue); font-family:var(--fs); font-size:32px">Seleção Enviada!</h2>
        <p>Suas fotos já foram selecionadas. Em breve, realizaremos o envio oficial em alta resolução. Obrigado!</p>
      </div>
    </div>
  </div>
</div>

<div class="selection-bar" id="bar" style="display:none">
  <div class="info-txt">
    <div class="status"><b id="sel-count">0</b> <span style="font-size:15px; opacity:0.6">de</span> <span id="p-total">10</span></div>
    <div class="hint" id="status-hint">Inclusas no seu pacote oficial.</div>
  </div>
  <button class="btn" onclick="enviarWhats()" style="padding:15px 40px; border-radius:50px">Finalizar Seleção</button>
</div>

<script>
let database = JSON.parse(localStorage.getItem('pe_db')) || [];
let selecionadas = [];
let atual = null;

function extrairLinks(texto) {
    const regex = /(https?:\/\/[^\s,]+)/g;
    let links = texto.match(regex) || [];
    return links.map(link => {
        if(link.includes('drive.google.com')){
            let id = '';
            if(link.includes('/d/')) id = link.split('/d/')[1].split('/')[0];
            else if(link.includes('id=')) id = link.split('id=')[1].split('&')[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}=w1000`;
        }
        return link;
    });
}

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const idEnsaio = urlParams.get('id');
    if(idEnsaio) {
        atual = database.find(e => e.id == idEnsaio);
        if(atual) {
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('cliente-tit').innerText = `Olá, ${atual.nome}!`;
            showPage('galeria');
            if(localStorage.getItem('done_' + idEnsaio)) mostrarTelaFinal();
        }
    } else renderDash();
};

function renderDash(){
  const search = document.getElementById('dash-search').value.toLowerCase();
  const lista = document.getElementById('lista-ensaios');
  const baseUrl = window.location.href.split('?')[0];
  const filtered = database.filter(e => e.nome.toLowerCase().includes(search));
  
  lista.innerHTML = filtered.map(e => `
    <div class="ensaio-item">
      <b>${e.nome} (${e.pacote} fotos)</b>
      <div class="link-box">${baseUrl}?id=${e.id}</div>
      <div style="display:flex; gap:10px">
        <button class="btn-alt" onclick="prepararEdicao(${e.id})">✏️ Editar</button>
        <button class="btn-alt" onclick="copyLink('${baseUrl}?id=${e.id}')">📋 Link</button>
        <button class="btn-alt" style="border-color:#ff4444; color:#ff4444" onclick="excluir(${e.id})">🗑️</button>
      </div>
    </div>
  `).join('') || "Nenhum álbum.";
}

function salvarEnsaio(){
  const idEdit = document.getElementById('c-edit-id').value;
  const nome = document.getElementById('c-name').value;
  const pass = document.getElementById('c-pass').value;
  const links = extrairLinks(document.getElementById('c-links').value);
  const pacote = document.getElementById('c-pacote').value;

  if(!nome || links.length === 0) return alert("Erro: Nome e Links são obrigatórios!");

  if(idEdit) {
    const idx = database.findIndex(e => e.id == idEdit);
    database[idx] = { id: Number(idEdit), nome, pass, links, pacote };
  } else {
    database.unshift({ id: Date.now(), nome, pass, links, pacote });
  }

  localStorage.setItem('pe_db', JSON.stringify(database));
  limparForm();
  renderDash();
  showPage('dash', document.getElementById('nav-dash'));
}

function abrirGaleria(){
  if(atual && atual.pass === document.getElementById('pass-input').value){
    document.getElementById('login-area').style.display='none';
    document.getElementById('galeria-area').style.display='block';
    document.getElementById('bar').style.display='flex';
    document.getElementById('p-total').innerText = atual.pacote;
    document.getElementById('boas-vindas').innerText = `Seleção de ${atual.nome}`;
    
    document.getElementById('grid').innerHTML = atual.links.map((l, i) => `
      <div class="photo-item" id="p-${i}" onclick="toggle(${i})">
        <div class="watermark"><span>PHOTO ENSAIO</span></div>
        <img src="${l}" loading="lazy">
      </div>
    `).join('');
  } else alert("Senha incorreta.");
}

function toggle(i){
  const el = document.getElementById('p-'+i);
  el.classList.toggle('selected');
  if(selecionadas.includes(i)) selecionadas = selecionadas.filter(x => x !== i);
  else selecionadas.push(i);
  
  const count = selecionadas.length;
  const pacote = parseInt(atual.pacote);
  const extra = Math.max(0, count - pacote);
  
  document.getElementById('sel-count').innerText = count;
  document.getElementById('sel-count').style.color = count > pacote ? 'var(--green)' : 'var(--accent-blue)';
  
  if(count > pacote) {
      document.getElementById('status-hint').innerHTML = `<b>${extra} foto(s) extra(s)</b> selecionada(s). Valor: R$ 19,90/cada.`;
  } else {
      document.getElementById('status-hint').innerText = "Inclusas no seu pacote oficial.";
  }
}

function enviarWhats(){
  const msg = encodeURIComponent(`Olá, Photo EnsAIo! Seleção Finalizada:\n👤 Cliente: ${atual.nome}\n📸 Fotos: ${selecionadas.map(x=>x+1).join(', ')}\n✅ Total: ${selecionadas.length}`);
  localStorage.setItem('done_' + atual.id, "true");
  window.open(`https://wa.me/5548996665391?text=${msg}`);
  mostrarTelaFinal();
}

function mostrarTelaFinal(){
    document.getElementById('login-area').style.display='none';
    document.getElementById('galeria-area').style.display='none';
    document.getElementById('bar').style.display='none';
    document.getElementById('finish-area').style.display='block';
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function prepararEdicao(id){
  const e = database.find(x => x.id == id);
  document.getElementById('c-edit-id').value = e.id;
  document.getElementById('c-name').value = e.nome;
  document.getElementById('c-pass').value = e.pass;
  document.getElementById('c-links').value = e.links.join('\n');
  document.getElementById('c-pacote').value = e.pacote;
  document.getElementById('form-title').innerText = "Editar Ensaio";
  document.getElementById('btn-save').innerText = "Salvar Alterações";
  showPage('novo', document.getElementById('nav-novo'));
}

function limparForm(){
  document.getElementById('c-edit-id').value = "";
  document.getElementById('c-name').value = "";
  document.getElementById('c-pass').value = "";
  document.getElementById('c-links').value = "";
  document.getElementById('c-pacote').value = "10";
  document.getElementById('form-title').innerText = "Configurar Novo Álbum";
  document.getElementById('btn-save').innerText = "Criar Galeria Profissional";
}

function copyLink(l){ navigator.clipboard.writeText(l); alert("Copiado!"); }
function excluir(id){ if(confirm("Apagar?")) { database = database.filter(e => e.id != id); localStorage.setItem('pe_db', JSON.stringify(database)); renderDash(); } }
function exportarBackup(){ const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database)); a.download = "backup.json"; a.click(); }
function importarBackup(ev){ const r = new FileReader(); r.onload = (e) => { try { database = JSON.parse(e.target.result); localStorage.setItem('pe_db', JSON.stringify(database)); renderDash(); alert("Sucesso!"); } catch(err) { alert("Erro no arquivo!"); } }; r.readAsText(ev.target.files[0]); }
</script>
</body>
</html>
