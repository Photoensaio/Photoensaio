<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo EnsAIo — Gestão Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --accent-blue: #00D1FF; --accent-purple: #9D50BB;
  --bg: #050505; --bg2: #0F0F12; --bg3: #1A1A20; 
  --text: #F0EDE8; --text-muted: #8A847E; --green: #7EC832;
  --fb: 'DM Sans', sans-serif; --fs: 'Playfair Display', serif;
}
body{font-family:var(--fb); background:var(--bg); color:var(--text); margin:0; overflow-x:hidden; -webkit-user-select:none; user-select:none;}
.app{display:flex; min-height:100vh}

/* Sidebar */
.sidebar{width:260px; background:var(--bg2); border-right:1px solid rgba(0, 209, 255, 0.1); padding:40px 0; position:sticky; top:0; height:100vh; z-index:10; display:flex; flex-direction:column;}
.sidebar-logo{font-family:var(--fs); font-size:24px; padding:0 30px 40px; color:#fff; letter-spacing:1px}
.sidebar-logo b{color:var(--accent-blue)}
.nav-item{display:block; padding:15px 30px; color:var(--text-muted); text-decoration:none; cursor:pointer; border:none; background:none; width:100%; text-align:left; font-size:14px; transition:0.3s;}
.nav-item:hover, .nav-item.active{background:rgba(0, 209, 255, 0.05); color:var(--accent-blue)}

/* Main Content */
.main{flex:1; padding:40px;}
.page{display:none} .page.active{display:block}
.card{background:var(--bg2); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:30px}

input, textarea{width:100%; background:var(--bg3); border:1px solid rgba(255,255,255,0.1); padding:15px; color:#fff; border-radius:12px; margin-bottom:15px; font-family:var(--fb); outline:none; box-sizing: border-box;}

.btn{background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); color:#fff; border:none; padding:15px 25px; border-radius:10px; cursor:pointer; font-weight:600; transition:0.4s;}
.btn-alt{background: var(--bg3); color: var(--text); border: 1px solid var(--accent-blue); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px;}

/* Grid de Fotos */
.photo-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; margin-top:30px; padding-bottom:150px}
.photo-item{aspect-ratio:3/4; background:var(--bg3); border-radius:15px; position:relative; overflow:hidden; border:3px solid transparent; cursor:pointer; transition:0.3s}
.photo-item img{width:100%; height:100%; object-fit:cover; filter: brightness(0.7);}
.photo-item.selected{border-color: var(--accent-blue);}
.photo-item.selected img{filter: brightness(1.1)}

.watermark{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none; opacity:0.1; font-weight:bold; transform:rotate(-30deg); font-size:10px; color:#fff}

/* Barra de Seleção */
.selection-bar{position:fixed; bottom:30px; left:290px; right:30px; background:rgba(15,15,18,0.95); backdrop-filter:blur(10px); padding:20px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--accent-blue); z-index:100;}

/* Modal */
.modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; padding:50px; overflow-y:auto}
.modal-content{background:var(--bg2); max-width:800px; margin:0 auto; padding:30px; border-radius:20px; border:1px solid var(--accent-blue)}
</style>
</head>
<body>

<div id="modal-selecao" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--fs)">Fotos que a cliente escolheu</h2>
            <button class="btn-alt" onclick="fecharModal()">Fechar</button>
        </div>
        <div id="modal-lista-links"></div>
    </div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">PHOTO<b>ENSAIO</b></div>
    <button class="nav-item active" onclick="showPage('dash', this)">Dashboard</button>
    <button class="nav-item" onclick="limparForm(); showPage('novo', this)">+ Novo Ensaio</button>
  </div>

  <div class="main">
    <div id="page-dash" class="page active">
      <h2 style="font-family:var(--fs); margin-bottom:20px">Meus Ensaios</h2>
      <div id="lista-ensaios"></div>
    </div>

    <div id="page-novo" class="page">
      <h2 id="form-title" style="font-family:var(--fs)">Configurar Álbum</h2>
      <div class="card">
        <input id="c-edit-id" type="hidden">
        <input id="c-name" type="text" placeholder="Nome do Cliente">
        <input id="c-pass" type="text" placeholder="Senha de Acesso">
        <textarea id="c-links" rows="10" placeholder="Cole aqui todos os links do Google Drive de uma vez"></textarea>
        <input id="c-pacote" type="number" placeholder="Quantas fotos no pacote?">
        <button class="btn" onclick="salvarEnsaio()" style="width:100%">Criar Galeria</button>
      </div>
    </div>

    <div id="page-galeria" class="page">
      <div id="login-area" style="text-align:center; padding-top:100px;">
        <h2 id="cliente-tit" style="font-family:var(--fs)">Acesse sua Galeria</h2>
        <input id="pass-input" type="password" placeholder="Digite sua senha" style="max-width:300px; text-align:center">
        <br>
        <button class="btn" onclick="abrirGaleria()">Entrar</button>
      </div>
      <div id="galeria-area" style="display:none">
        <h2 id="boas-vindas" style="font-family:var(--fs)">Escolha suas fotos favoritas</h2>
        <div class="photo-grid" id="grid"></div>
      </div>
    </div>
  </div>
</div>

<div class="selection-bar" id="bar" style="display:none">
  <div><b id="sel-count">0</b> fotos selecionadas</div>
  <button class="btn" onclick="enviarSelecao()">Finalizar Seleção</button>
</div>

<script>
let database = JSON.parse(localStorage.getItem('pe_db')) || [];
let selecionadas = [];
let atual = null;

// FUNÇÃO CORRIGIDA PARA O GOOGLE DRIVE
function converterLinkDrive(texto) {
    const regex = /(https?:\/\/[^\s,]+)/g;
    const links = texto.match(regex) || [];
    return links.map(link => {
        if(link.includes('drive.google.com')){
            let id = '';
            if(link.includes('/d/')) id = link.split('/d/')[1].split('/')[0];
            else if(link.includes('id=')) id = link.split('id=')[1].split('&')[0];
            return `https://drive.google.com/thumbnail?id=${id}&sz=s1200`; // Link robusto
        }
        return link;
    });
}

function renderDash(){
  const lista = document.getElementById('lista-ensaios');
  lista.innerHTML = database.map(e => `
    <div class="card" style="padding:20px; display:flex; justify-content:space-between; align-items:center">
      <div>
        <b style="font-size:18px">${e.nome}</b><br>
        <span style="font-size:12px; color:var(--text-muted)">Senha: ${e.pass} | Pacote: ${e.pacote}</span>
      </div>
      <div style="display:flex; gap:10px">
        ${e.escolhidas ? `<button class="btn-alt" style="border-color:var(--green)" onclick="verSelecao(${e.id})">👁️ Ver Seleção</button>` : ''}
        <button class="btn-alt" onclick="prepararEdicao(${e.id})">Editar</button>
        <button class="btn-alt" onclick="excluirEnsaio(${e.id})" style="border-color:red">Excluir</button>
      </div>
    </div>
  `).join('') || "Nenhum ensaio cadastrado.";
}

function salvarEnsaio(){
  const idEdit = document.getElementById('c-edit-id').value;
  const nome = document.getElementById('c-name').value;
  const pass = document.getElementById('c-pass').value;
  const pacote = document.getElementById('c-pacote').value;
  const linksRaw = document.getElementById('c-links').value;
  const links = converterLinkDrive(linksRaw);

  if(!nome || links.length === 0) return alert("Preencha o nome e cole os links!");

  if(idEdit) {
    const idx = database.findIndex(e => e.id == idEdit);
    database[idx] = { ...database[idx], nome, pass, links, pacote };
  } else {
    database.unshift({ id: Date.now(), nome, pass, links, pacote, escolhidas: null });
  }

  localStorage.setItem('pe_db', JSON.stringify(database));
  location.reload(); // Recarrega para limpar tudo
}

function abrirGaleria(){
  if(atual && atual.pass === document.getElementById('pass-input').value){
    document.getElementById('login-area').style.display='none';
    document.getElementById('galeria-area').style.display='block';
    document.getElementById('bar').style.display='flex';
    document.getElementById('grid').innerHTML = atual.links.map((l, i) => `
      <div class="photo-item" id="p-${i}" onclick="toggle(${i})">
        <div class="watermark">PHOTO ENSAIO</div>
        <img src="${l}" loading="lazy">
      </div>
    `).join('');
  } else alert("Senha incorreta!");
}

function toggle(i){
  const el = document.getElementById('p-'+i);
  el.classList.toggle('selected');
  if(selecionadas.includes(i)) selecionadas = selecionadas.filter(x => x !== i);
  else selecionadas.push(i);
  document.getElementById('sel-count').innerText = selecionadas.length;
}

function enviarSelecao(){
  const linksEscolhidos = selecionadas.map(i => atual.links[i]);
  const msg = encodeURIComponent(`Olá Tamires! Finalizei minha seleção:\n👤 Cliente: ${atual.nome}\n📸 Fotos escolhidas: ${selecionadas.length}`);
  
  // Salva no seu Dashboard
  const dbIdx = database.findIndex(e => e.id == atual.id);
  database[dbIdx].escolhidas = linksEscolhidos;
  localStorage.setItem('pe_db', JSON.stringify(database));
  
  window.open(`https://wa.me/5548996665391?text=${msg}`);
  alert("Seleção enviada com sucesso!");
}

function verSelecao(id){
  const e = database.find(x => x.id == id);
  document.getElementById('modal-lista-links').innerHTML = e.escolhidas.map((l, i) => `
    <div style="background:var(--bg3); padding:10px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between">
      <span>Foto ${i+1}</span>
      <a href="${l}" target="_blank" style="color:var(--accent-blue)">Abrir no Drive</a>
    </div>
  `).join('');
  document.getElementById('modal-selecao').style.display = 'block';
}

function fecharModal(){ document.getElementById('modal-selecao').style.display = 'none'; }

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

function prepararEdicao(id){
  const e = database.find(x => x.id == id);
  document.getElementById('c-edit-id').value = e.id;
  document.getElementById('c-name').value = e.nome;
  document.getElementById('c-pass').value = e.pass;
  document.getElementById('c-links').value = e.links.join('\n');
  document.getElementById('c-pacote').value = e.pacote;
  showPage('novo');
}

function excluirEnsaio(id){ if(confirm("Apagar ensaio?")) { database = database.filter(e => e.id != id); localStorage.setItem('pe_db', JSON.stringify(database)); renderDash(); } }

window.onload = () => {
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  if(id) {
    atual = database.find(e => e.id == id);
    if(atual) {
      document.getElementById('sidebar').style.display = 'none';
      showPage('galeria');
    }
  } else renderDash();
};
</script>
</body>
</html>
